   <script>
document.addEventListener("DOMContentLoaded", () => {
  const beanWrap = document.querySelector(".kv-bean");
  const beanImg  = document.querySelector(".bean-img");

  const onEnd = (e) => {
    if (e.animationName === "slideInLeft") {   // Animate.css 動畫結束
      beanImg.classList.add("breathing");      // 啟動呼吸縮放
      beanWrap.removeEventListener("animationend", onEnd);
      beanWrap.removeEventListener("webkitAnimationEnd", onEnd);
    }
  };

  beanWrap.addEventListener("animationend", onEnd);
  beanWrap.addEventListener("webkitAnimationEnd", onEnd); // Safari 支援
});
</script>
