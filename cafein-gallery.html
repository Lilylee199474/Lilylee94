<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAFE!N 視覺作品 — Lily Lee</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0812;
  --bg2:#120b1a;
  --card:#1c1228;
  --ink:#f2ecfc;
  --ink2:#a08cbf;
  --ink3:#5c4d73;
  --line:rgba(200,150,255,.08);
  --line2:rgba(200,150,255,.16);
  --acc:#e05fa0;
  --acc2:#a855d4;
  --r:14px;
}
html{scroll-behavior:smooth;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ── BACK NAV ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:60px;
  background:rgba(13,8,18,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line2);
}
.back-btn{
  display:flex;align-items:center;gap:8px;
  color:var(--ink2);text-decoration:none;font-size:14px;font-weight:600;
  transition:color .2s;
}
.back-btn:hover{color:var(--ink);}
.back-btn svg{width:18px;height:18px;}
.topbar-title{font-size:14px;font-weight:600;color:var(--ink3);}

/* ── HERO ── */
.hero{
  padding:120px 32px 56px;
  max-width:1100px;margin:0 auto;
}
.eyebrow{
  font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--acc);margin-bottom:14px;
}
.hero h1{
  font-size:clamp(36px,6vw,72px);font-weight:800;letter-spacing:-.04em;
  line-height:1.05;margin-bottom:16px;
}
.hero p{font-size:15px;color:var(--ink2);max-width:520px;line-height:1.8;}

/* ── SECTION ── */
.section{max-width:1100px;margin:0 auto;padding:0 32px 80px;}
.sec-label{
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:20px;padding-bottom:12px;
  border-bottom:1px solid var(--line2);
}
.sec-label span{color:var(--ink2);}

/* ── MASONRY GALLERY ── */
.masonry{
  columns:3;
  column-gap:28px;
}
.masonry .thumb{
  break-inside:avoid;
  margin-bottom:28px;
  overflow:hidden;
  border-radius:var(--r);
  background:var(--card);
  cursor:pointer;
}
.masonry .thumb img{
  width:100%;height:auto;display:block;
  transition:transform .45s ease,filter .3s;
}
.masonry .thumb:hover img{transform:scale(1.03);filter:brightness(1.06);}

/* ── LIGHTBOX ── */
.lb{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.92);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
  cursor:pointer;
}
.lb.open{display:flex;}
.lb-img{
  max-width:90vw;max-height:88vh;
  object-fit:contain;border-radius:10px;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
  cursor:default;
}
.lb-close{
  position:fixed;top:20px;right:24px;
  font-size:28px;color:#fff;cursor:pointer;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.1);border-radius:50%;
  transition:background .2s;
}
.lb-close:hover{background:rgba(255,255,255,.2);}
.lb-prev,.lb-next{
  position:fixed;top:50%;transform:translateY(-50%);
  font-size:22px;color:#fff;cursor:pointer;
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.1);border-radius:50%;
  transition:background .2s;
}
.lb-prev{left:20px;} .lb-next{right:20px;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.2);}
.lb-counter{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:13px;color:rgba(255,255,255,.5);font-family:'Manrope',sans-serif;
  letter-spacing:.06em;
}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--line2);
  padding:32px;
  display:flex;justify-content:space-between;align-items:center;
  max-width:1100px;margin:0 auto;
  font-size:13px;color:var(--ink3);
}

@media(max-width:768px){
  .topbar{padding:0 20px;}
  .hero{padding:90px 20px 40px;}
  .section{padding:0 20px 60px;}
  .masonry{columns:2;column-gap:16px;}
  .masonry .thumb{margin-bottom:16px;}
  .lb-prev{left:8px;} .lb-next{right:8px;}
}
@media(max-width:480px){
  .masonry{columns:1;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html#portfolio" class="back-btn">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M11 14L6 9l5-5"/>
    </svg>
    返回作品集
  </a>
  <span class="topbar-title">CAFE!N 視覺作品</span>
</div>

<!-- HERO -->
<div class="hero">
  <p class="eyebrow">活動頁 · 品牌視覺</p>
  <h1>CAFE!N<br>視覺作品</h1>
  <p>為 CAFE!N 硬咖啡製作的品牌視覺素材，延續職人極簡風格，在美學與導購效益之間取得精準平衡。</p>
</div>

<!-- GALLERY -->
<div class="section">
  <div class="sec-label">視覺素材 <span>· 6 張</span></div>
  <div class="masonry" id="galleryGrid">
    <div class="thumb" data-group="gallery" data-idx="0"><img src="images/cafein-img/cafe1.webp" alt="CAFE!N 視覺 1" loading="lazy"></div>
    <div class="thumb" data-group="gallery" data-idx="1"><img src="images/cafein-img/cafe2.webp" alt="CAFE!N 視覺 2" loading="lazy"></div>
    <div class="thumb" data-group="gallery" data-idx="2"><img src="images/cafein-img/cafe3.webp" alt="CAFE!N 視覺 3" loading="lazy"></div>
    <div class="thumb" data-group="gallery" data-idx="3"><img src="images/cafein-img/cafe4.webp" alt="CAFE!N 視覺 4" loading="lazy"></div>
    <div class="thumb" data-group="gallery" data-idx="4"><img src="images/cafein-img/cafe5.webp" alt="CAFE!N 視覺 5" loading="lazy"></div>
    <div class="thumb" data-group="gallery" data-idx="5"><img src="images/cafein-img/cafe6.webp" alt="CAFE!N 視覺 6" loading="lazy"></div>
  </div>
</div>

<footer>
  <span>© 2025 李酈庭 Lily Lee</span>
  <span>CAFE!N · 品牌視覺</span>
</footer>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <div class="lb-close" id="lbClose">✕</div>
  <img class="lb-img" id="lbImg" src="" alt="">
  <div class="lb-prev" id="lbPrev">‹</div>
  <div class="lb-next" id="lbNext">›</div>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
const groups = {
  gallery: [
    'images/cafein-img/cafe1.webp','images/cafein-img/cafe2.webp','images/cafein-img/cafe3.webp',
    'images/cafein-img/cafe4.webp','images/cafein-img/cafe5.webp','images/cafein-img/cafe6.webp'
  ]
};

const lb = document.getElementById('lb');
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');
let curGroup = '', curIdx = 0;

function openLb(group, idx) {
  curGroup = group; curIdx = idx;
  lbImg.src = groups[group][idx];
  lbCounter.textContent = (idx + 1) + ' / ' + groups[group].length;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function navigate(dir) {
  const arr = groups[curGroup];
  curIdx = (curIdx + dir + arr.length) % arr.length;
  lbImg.src = arr[curIdx];
  lbCounter.textContent = (curIdx + 1) + ' / ' + arr.length;
}

document.querySelectorAll('.thumb').forEach(el => {
  el.addEventListener('click', () => openLb(el.dataset.group, +el.dataset.idx));
});
document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); navigate(1); });
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});
</script>
</body>
</html>
